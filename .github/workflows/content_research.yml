name: Autonomous Topic Discovery

on:
  schedule:
    - cron: '0 8 1 * *'  # Runs at 8:00 AM on the 1st of every month
  workflow_dispatch:      # Allows manual trigger for on-demand research

jobs:
  discover-topics:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run Topic Research Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python topic_research_agent.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Azura Discovery Bot"
          git config --global user.email "discovery-bot@azura-ai.github.io"
          git add content_calendar.md
          git diff --cached --quiet || git commit -m "🔍 [Bot] SEO Content Calendar Refreshed: New High-Intent Topics Added"
          git push
