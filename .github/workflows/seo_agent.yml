name: SEO Content Agent

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC (1 post per week)
  workflow_dispatch:      # Manual trigger for on-demand drafting

jobs:
  draft-content:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai markdown-it-py

      - name: Run SEO Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python seo_agent.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Azura SEO Agent"
          git config --global user.email "seo@azura-ai.github.io"
          git add .
          git diff --cached --quiet || git commit -m "📝 New blog post published by SEO agent"
          git push
