<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Finder Demo | Nexus Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .leads-page { padding-top: 120px; min-height: 100vh; }
        .leads-container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        .leads-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .region-selector { display: flex; gap: 1rem; }
        .region-btn { padding: 0.5rem 1.2rem; border-radius: 30px; border: 1px solid var(--border); background: transparent; color: white; cursor: pointer; transition: 0.3s; }
        .region-btn.active { background: var(--accent); border-color: var(--accent); }
        .leads-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .leads-table th, .leads-table td { padding: 1.5rem; text-align: left; border-bottom: 1px solid var(--border); }
        .leads-table th { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-open { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    </style>
</head>
<body class="leads-page">
    <header>
        <nav class="glass">
            <div class="logo">NEXUS<span>.AI</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Back to Site</a></li>
            </ul>
        </nav>
    </header>

    <div class="leads-container">
        <div class="leads-header">
            <h1 class="reveal-text">Lead <span>Prospector.</span></h1>
            <div class="region-selector">
                <button class="region-btn active" onclick="loadLeads('USA')">USA</button>
                <button class="region-btn" onclick="loadLeads('Middle East')">Middle East</button>
                <button class="region-btn" onclick="loadLeads('Europe')">Europe</button>
            </div>
        </div>

        <table class="leads-table">
            <thead>
                <tr>
                    <th>Company Name</th>
                    <th>Industry</th>
                    <th>Identified Need</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="leads-body">
                <!-- Leads will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        const leadsData = {
            'USA': [
                { name: 'SkyLogistics US', industry: 'Logistics', need: 'OCR for Bills of Lading', status: 'High Intent' },
                { name: 'FutureHealth NY', industry: 'Healthcare', need: 'Predictive Patient Care', status: 'Warm' }
            ],
            'Middle East': [
                { name: 'Emirates Smart City', industry: 'Public Sector', need: 'Agentic Gov Interface', status: 'High Intent' },
                { name: 'Desert Solar Co', industry: 'Energy', need: 'Computer Vision Scans', status: 'Warm' }
            ],
            'Europe': [
                { name: 'Berlin FinTech', industry: 'Finance', need: 'Real-time Fraud AI', status: 'Warm' },
                { name: 'Parisian Retail', industry: 'Retail', need: 'Personalized RAG Bot', status: 'High Intent' }
            ]
        };

        async function loadLeads(region) {
            // Update active btn
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === region);
            });

            const body = document.getElementById('leads-body');
            body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Scanning region with AI...</td></tr>';

            try {
                const response = await fetch(`http://localhost:8000/prospects/${region}`);
                const leads = await response.json();
                
                if (leads.message) {
                    body.innerHTML = `<tr><td colspan="5" style="text-align:center;">${leads.message}</td></tr>`;
                    return;
                }

                body.innerHTML = leads.map(lead => `
                    <tr>
                        <td><strong>${lead.name || lead.company}</strong></td>
                        <td>${lead.industry}</td>
                        <td>${lead.pain_point || lead.need}</td>
                        <td><span class="status-badge status-open">High Intent</span></td>
                        <td><button class="cta-button" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Generate Pitch</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Demo Mode: Start the Python backend to see live AI leads. <br> Using fallback data below.</td></tr>';
                // Fallback simulation if backend is down
                const fallback = [
                    { name: 'SkyLogistics ' + region, industry: 'Logistics', need: 'OCR Automation', status: 'Warm' },
                    { name: 'FutureHealth ' + region, industry: 'Healthcare', need: 'Predictive Care', status: 'High Intent' }
                ];
                body.innerHTML += fallback.map(lead => `
                    <tr>
                        <td><strong>${lead.name}</strong></td>
                        <td>${lead.industry}</td>
                        <td>${lead.need}</td>
                        <td><span class="status-badge status-open">${lead.status}</span></td>
                        <td><button class="cta-button" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Generate Pitch</button></td>
                    </tr>
                `).join('');
            }
        }

        loadLeads('USA');
    </script>
</body>
</html>
